<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gift Catcher | Поймай подарок</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .game-wrapper {
    background: linear-gradient(145deg, #2d3a4e, #1e2a3a);
    border-radius: 48px;
    padding: 24px;
    box-shadow: 0 25px 45px rgba(0,0,0,0.4);
  }
  
  canvas {
    display: block;
    margin: 0 auto;
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    cursor: none;
    background: linear-gradient(180deg, #1e2a3a 0%, #0f172a 100%);
  }
  
  .game-panel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 16px 24px;
    background: rgba(255,255,255,0.1);
    border-radius: 60px;
    backdrop-filter: blur(10px);
    gap: 16px;
    flex-wrap: wrap;
  }
  
  .stat-card {
    background: rgba(0,0,0,0.5);
    padding: 8px 20px;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  
  .stat-card i {
    font-size: 1.3rem;
  }
  
  .stat-card .fa-gift { color: #fbbf24; }
  .stat-card .fa-bomb { color: #ef4444; }
  .stat-card .fa-star { color: #f59e0b; }
  .stat-card .fa-heart { color: #ec489a; }
  
  .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: white;
  }
  
  .stat-label {
    font-size: 0.7rem;
    color: #94a3b8;
    margin-left: 6px;
  }
  
  .combo-badge {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    padding: 8px 20px;
    border-radius: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .combo-badge i {
    color: white;
    font-size: 1rem;
  }
  
  .combo-badge span {
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
  }
  
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 20px;
    gap: 16px;
    flex-wrap: wrap;
  }
  
  button {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(245,158,11,0.4);
  }
  
  .controls-info {
    background: rgba(0,0,0,0.5);
    padding: 8px 20px;
    border-radius: 40px;
    color: #94a3b8;
    font-size: 0.8rem;
    display: flex;
    gap: 20px;
  }
  
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }
  
  .modal-content {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    border-radius: 32px;
    padding: 32px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    border: 1px solid rgba(245,158,11,0.3);
  }
  
  .modal-content h2 {
    font-size: 2rem;
    margin-bottom: 16px;
  }
  
  .modal-content .result-stats {
    background: rgba(0,0,0,0.3);
    border-radius: 24px;
    padding: 16px;
    margin: 20px 0;
  }
  
  .modal-buttons {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  
  @media (max-width: 768px) {
    .game-panel { justify-content: center; }
    .controls { flex-direction: column; }
    .controls-info { order: -1; width: 100%; justify-content: center; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-panel">
    <div class="stat-card">
      <i class="fas fa-gift"></i>
      <div>
        <span class="stat-value" id="score">0</span>
        <span class="stat-label">ПОДАРКИ</span>
      </div>
    </div>
    <div class="stat-card">
      <i class="fas fa-bomb"></i>
      <div>
        <span class="stat-value" id="bombs">0</span>
        <span class="stat-label">БОМБЫ</span>
      </div>
    </div>
    <div class="stat-card">
      <i class="fas fa-star"></i>
      <div>
        <span class="stat-value" id="totalScore">0</span>
        <span class="stat-label">ОЧКИ</span>
      </div>
    </div>
    <div class="stat-card">
      <i class="fas fa-heart"></i>
      <div>
        <span class="stat-value" id="lives">3</span>
        <span class="stat-label">ЖИЗНИ</span>
      </div>
    </div>
    <div class="combo-badge" id="comboBadge" style="display: none;">
      <i class="fas fa-fire"></i>
      <span id="combo">0</span>
      <span style="font-size:0.8rem;">КОМБО</span>
    </div>
  </div>
  
  <canvas id="gameCanvas" width="800" height="550"></canvas>
  
  <div class="controls">
    <button id="startBtn"><i class="fas fa-play"></i> Начать игру</button>
    <div class="controls-info">
      <span><i class="fas fa-arrow-left"></i> ←</span>
      <span><i class="fas fa-arrow-right"></i> →</span>
      <span>или мышь</span>
      <span><i class="fas fa-gift"></i> Подарок +10</span>
      <span><i class="fas fa-bomb"></i> Бомба -20</span>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Игровые переменные
  let gifts = [];        // падающие подарки
  let score = 0;         // очки
  let giftsCaught = 0;   // пойманные подарки
  let bombsCaught = 0;   // пойманные бомбы
  let lives = 3;
  let combo = 0;
  let gameRunning = false;
  let animationId = null;
  let comboTimeout = null;
  
  // Платформа
  const paddle = {
    width: 120,
    height: 18,
    x: canvas.width / 2 - 60,
    y: canvas.height - 45,
    speed: 7
  };
  
  // Мяч
  let ball = {
    x: canvas.width / 2,
    y: canvas.height - 80,
    dx: 4,
    dy: -4,
    radius: 7,
    active: true
  };
  
  // Управление
  let leftPressed = false;
  let rightPressed = false;
  
  // Эффекты
  let particles = [];
  
  // Настройки падающих предметов
  let giftSpawnCounter = 0;
  const GIFT_SPAWN_DELAY = 35;
  
  // Цвета для подарков
  const giftColors = ['#fbbf24', '#f59e0b', '#ef4444', '#ec489a', '#8b5cf6', '#06b6d4'];
  
  // Создание частиц
  function createParticles(x, y, color, isGift = true) {
    const count = isGift ? 12 : 8;
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 4 - 2,
        life: 1,
        color: color,
        size: Math.random() * 4 + 2
      });
    }
  }
  
  // Обновление частиц
  function updateParticles() {
    for (let i = 0; i < particles.length; i++) {
      particles[i].x += particles[i].vx;
      particles[i].y += particles[i].vy;
      particles[i].vy += 0.15;
      particles[i].life -= 0.025;
      if (particles[i].life <= 0) {
        particles.splice(i, 1);
        i--;
      }
    }
  }
  
  // Спавн подарка или бомбы
  function spawnItem() {
    const isGift = Math.random() < 0.7; // 70% подарки, 30% бомбы
    gifts.push({
      x: Math.random() * (canvas.width - 40) + 20,
      y: -30,
      width: 32,
      height: 32,
      speed: 2 + Math.random() * 2,
      isGift: isGift,
      rotation: 0
    });
  }
  
  // Обновление комбо
  function updateCombo() {
    if (comboTimeout) clearTimeout(comboTimeout);
    document.getElementById('comboBadge').style.display = 'flex';
    document.getElementById('combo').innerText = combo;
    comboTimeout = setTimeout(() => {
      combo = 0;
      document.getElementById('combo').innerText = '0';
      document.getElementById('comboBadge').style.display = 'none';
    }, 2000);
  }
  
  // Обновление UI
  function updateUI() {
    document.getElementById('score').innerText = giftsCaught;
    document.getElementById('bombs').innerText = bombsCaught;
    document.getElementById('totalScore').innerText = score;
    document.getElementById('lives').innerText = lives;
  }
  
  // Отрисовка
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Градиентный фон
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#1e2a3a');
    gradient.addColorStop(1, '#0f172a');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Звёзды
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    for (let i = 0; i < 80; i++) {
      if (i % 2 === 0) continue;
      ctx.beginPath();
      ctx.arc((i * 173) % canvas.width, (i * 257) % canvas.height, 1.2, 0, Math.PI * 2);
      ctx.fill();
    }
    
    // Падающие предметы
    gifts.forEach(g => {
      ctx.save();
      ctx.translate(g.x + g.width/2, g.y + g.height/2);
      ctx.rotate(g.rotation);
      
      if (g.isGift) {
        // Подарок 🎁
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(251,191,36,0.5)';
        ctx.fillStyle = '#fbbf24';
        ctx.fillRect(-g.width/2, -g.height/2, g.width, g.height);
        ctx.fillStyle = '#f59e0b';
        ctx.fillRect(-g.width/2 + 8, -g.height/2 + 8, g.width - 16, g.height - 16);
        ctx.fillStyle = '#fff';
        ctx.font = `${g.width - 12}px "Segoe UI Emoji"`;
        ctx.fillText('🎁', -12, 12);
      } else {
        // Бомба 💣
        ctx.shadowBlur = 8;
        ctx.shadowColor = 'rgba(239,68,68,0.5)';
        ctx.fillStyle = '#2d2d2d';
        ctx.beginPath();
        ctx.arc(0, 0, g.width/2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ef4444';
        ctx.font = `${g.width - 12}px "Segoe UI Emoji"`;
        ctx.fillText('💣', -12, 10);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(8, -8, 4, 0, Math.PI * 2);
        ctx.fill();
      }
      
      ctx.restore();
    });
    
    // Мяч
    ctx.shadowBlur = 12;
    ctx.shadowColor = 'rgba(245,158,11,0.6)';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
    const gradientBall = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 2, ball.x, ball.y, ball.radius);
    gradientBall.addColorStop(0, '#fbbf24');
    gradientBall.addColorStop(1, '#f59e0b');
    ctx.fillStyle = gradientBall;
    ctx.fill();
    
    // Платформа
    ctx.shadowBlur = 10;
    ctx.shadowColor = 'rgba(245,158,11,0.5)';
    ctx.fillStyle = '#f59e0b';
    ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(paddle.x + 4, paddle.y + 3, paddle.width - 8, 4);
    ctx.shadowBlur = 0;
    
    // Частицы
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    
    // Эффект комбо
    if (combo > 0 && comboTimeout) {
      ctx.font = 'bold 28px Inter';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#f59e0b';
      ctx.fillStyle = '#fbbf24';
      ctx.textAlign = 'center';
      ctx.fillText(`x${combo} КОМБО!`, canvas.width / 2, 70);
      ctx.textAlign = 'left';
    }
  }
  
  // Обновление физики
  function update() {
    if (!gameRunning) return;
    
    // Движение платформы
    if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;
    if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
    
    // Движение мяча
    ball.x += ball.dx;
    ball.y += ball.dy;
    
    // Столкновение со стенами
    if (ball.x + ball.radius > canvas.width) {
      ball.x = canvas.width - ball.radius;
      ball.dx = -ball.dx;
      createParticles(ball.x, ball.y, '#fbbf24', true);
    } else if (ball.x - ball.radius < 0) {
      ball.x = ball.radius;
      ball.dx = -ball.dx;
      createParticles(ball.x, ball.y, '#fbbf24', true);
    }
    
    if (ball.y - ball.radius < 0) {
      ball.y = ball.radius;
      ball.dy = -ball.dy;
      createParticles(ball.x, ball.y, '#fbbf24', true);
    }
    
    // Столкновение с платформой
    if (ball.y + ball.radius > paddle.y && 
        ball.y - ball.radius < paddle.y + paddle.height &&
        ball.x + ball.radius > paddle.x && 
        ball.x - ball.radius < paddle.x + paddle.width) {
      
      const hitPos = (ball.x - paddle.x) / paddle.width;
      const angle = (hitPos - 0.5) * Math.PI / 2.2;
      const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
      
      ball.dx = Math.sin(angle) * speed;
      ball.dy = -Math.cos(angle) * speed;
      ball.y = paddle.y - ball.radius;
      
      createParticles(ball.x, ball.y, '#f59e0b', true);
      if (navigator.vibrate) navigator.vibrate(30);
    }
    
    // Потеря мяча
    if (ball.y + ball.radius > canvas.height) {
      lives--;
      updateUI();
      createParticles(ball.x, ball.y, '#ef4444', false);
      if (navigator.vibrate) navigator.vibrate(100);
      
      if (lives <= 0) {
        gameOver();
        return;
      }
      
      // Сброс мяча
      ball.x = canvas.width / 2;
      ball.y = canvas.height - 80;
      ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
      ball.dy = -4;
      
      // Сброс комбо
      combo = 0;
      if (comboTimeout) clearTimeout(comboTimeout);
      document.getElementById('comboBadge').style.display = 'none';
    }
    
    // Движение и столкновение с подарками
    for (let i = 0; i < gifts.length; i++) {
      const g = gifts[i];
      g.y += g.speed;
      g.rotation += 0.05;
      
      // Столкновение с мячом
      if (ball.x + ball.radius > g.x && 
          ball.x - ball.radius < g.x + g.width &&
          ball.y + ball.radius > g.y && 
          ball.y - ball.radius < g.y + g.height) {
        
        if (g.isGift) {
          const points = 10 + Math.floor(combo / 5) * 2;
          score += points;
          giftsCaught++;
          combo++;
          updateCombo();
          createParticles(g.x + g.width/2, g.y + g.height/2, '#fbbf24', true);
          if (navigator.vibrate) navigator.vibrate(40);
        } else {
          const penalty = 20;
          score = Math.max(0, score - penalty);
          bombsCaught++;
          combo = 0;
          if (comboTimeout) clearTimeout(comboTimeout);
          document.getElementById('comboBadge').style.display = 'none';
          createParticles(g.x + g.width/2, g.y + g.height/2, '#ef4444', false);
          if (navigator.vibrate) navigator.vibrate(60);
        }
        
        gifts.splice(i, 1);
        updateUI();
        
        // Небольшой отскок мяча
        ball.dy = -ball.dy * 1.05;
        break;
      }
      
      // Удаление вышедших за экран
      if (g.y > canvas.height) {
        gifts.splice(i, 1);
        i--;
      }
    }
    
    // Спавн новых предметов
    giftSpawnCounter++;
    if (giftSpawnCounter >= GIFT_SPAWN_DELAY && gameRunning) {
      giftSpawnCounter = 0;
      spawnItem();
    }
    
    updateParticles();
  }
  
  // Игровой цикл
  function gameLoop() {
    update();
    draw();
    animationId = requestAnimationFrame(gameLoop);
  }
  
  // Завершение игры
  function gameOver() {
    gameRunning = false;
    cancelAnimationFrame(animationId);
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h2 style="color: #f59e0b;">🎁 ИГРА ОКОНЧЕНА</h2>
        <div class="result-stats">
          <p style="color: #fbbf24; font-size: 1.2rem; margin-bottom: 12px;">Ваш результат</p>
          <p><i class="fas fa-gift"></i> Подарков: ${giftsCaught}</p>
          <p><i class="fas fa-bomb"></i> Бомб: ${bombsCaught}</p>
          <p><i class="fas fa-star"></i> Очков: ${score}</p>
          <p><i class="fas fa-fire"></i> Макс. комбо: ${combo}</p>
        </div>
        <div class="modal-buttons">
          <button id="restartBtn"><i class="fas fa-redo"></i> Играть снова</button>
          <button id="closeBtn"><i class="fas fa-check"></i> Отлично!</button>
        </div>
      </div>
    `;
    document.body.appendChild(modal);
    
    document.getElementById('restartBtn').onclick = () => {
      modal.remove();
      resetGame();
      startGame();
    };
    document.getElementById('closeBtn').onclick = () => modal.remove();
    
    // Сохраняем результат для конструктора приглашений
    if (window.saveGameResult) {
      window.saveGameResult(score, giftsCaught, bombsCaught);
    }
  }
  
  // Сброс игры
  function resetGame() {
    gifts = [];
    score = 0;
    giftsCaught = 0;
    bombsCaught = 0;
    lives = 3;
    combo = 0;
    giftSpawnCounter = 0;
    
    paddle.x = canvas.width / 2 - paddle.width / 2;
    ball.x = canvas.width / 2;
    ball.y = canvas.height - 80;
    ball.dx = 4;
    ball.dy = -4;
    
    if (comboTimeout) clearTimeout(comboTimeout);
    document.getElementById('comboBadge').style.display = 'none';
    updateUI();
  }
  
  // Запуск игры
  function startGame() {
    if (gameRunning) return;
    resetGame();
    gameRunning = true;
    gameLoop();
  }
  
  // Управление мышью
  function handleMouseMove(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    let mouseX;
    
    if (e.touches) {
      mouseX = (e.touches[0].clientX - rect.left) * scaleX;
      e.preventDefault();
    } else {
      mouseX = (e.clientX - rect.left) * scaleX;
    }
    
    let newX = mouseX - paddle.width / 2;
    newX = Math.max(0, Math.min(newX, canvas.width - paddle.width));
    paddle.x = newX;
  }
  
  // Обработчики событий
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
      leftPressed = true;
      e.preventDefault();
    } else if (e.key === 'ArrowRight') {
      rightPressed = true;
      e.preventDefault();
    }
  });
  
  document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft') leftPressed = false;
    if (e.key === 'ArrowRight') rightPressed = false;
  });
  
  canvas.addEventListener('mousemove', handleMouseMove);
  canvas.addEventListener('touchmove', handleMouseMove);
  canvas.addEventListener('touchstart', (e) => e.preventDefault());
  
  document.getElementById('startBtn').addEventListener('click', startGame);
  
  // Инициализация
  resetGame();
  draw();
  
  console.log('🎮 Игра "Поймай подарок" готова!');
</script>
</body>
</html>
